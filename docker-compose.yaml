services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-sql-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: postgres
      DB_READ_USER: ${DB_READ_USER}
      DB_READ_PASS: ${DB_READ_PASS}
      DB_WRITE_USER: ${DB_WRITE_USER}
      DB_WRITE_PASS: ${DB_WRITE_PASS}
      LLM_MODEL: /app/models/sqlcoder-7b-2.Q5_K_M.gguf
      SCHEMA: /app/logs/schema.json
      ErrorLog: /app/logs/ErrorLog.log
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./sqlcoder-7b-2.Q5_K_M.gguf:/app/models/sqlcoder-7b-2.Q5_K_M.gguf:ro
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: ai-sql-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: