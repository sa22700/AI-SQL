services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-sql-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: postgres
      DB_READ_USER: ${DB_READ_USER}
      DB_READ_PASS: ${DB_READ_PASS}
      DB_WRITE_USER: ${DB_WRITE_USER}
      DB_WRITE_PASS: ${DB_WRITE_PASS}
      API_BASE: ${API_BASE}
      LLM_MODEL: /app/models/example.gguf
      SCHEMA: /app/logs/schema.json
      ERROR_LOG: /app/logs/ErrorLog.log
      SQL_PROMPT: /app/logs/sql_prompt.txt
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./example.gguf:/app/models/example.gguf:ro
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: ai-sql-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: